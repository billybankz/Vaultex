[build]
  command = "npm install && cd vault-ui && npm install && npm run build"
  publish = "vault-ui/dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/email-api/send-reset"
  to = "/.netlify/functions/send-reset"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
